body:
  text: 春秋簡書刋誤春秋類提要臣等謹案春秋簡書刋誤二卷國朝毛竒齡撰竒齡作春秋傳以春秋經文為據古之簡書以左傳所述為據古之䇿書故此編刋經文之誤以簡書為名皆以左傳為主而附載公榖之異文辨證其謬因胡安國傳多從榖梁并安國亦排斥之其舍左氏而從公羊者惟襄公十四年衛侯衎出奔齊一條耳考左傳雖晚出而其文實竹帛相傳公榖雖先立于學宫而其初皆由經師口授或記憶之失真或方音之遞轉勢所必然不足為怪竒齡必以為有意改經至於作于饗作享亦縷論之殊為深詆然其論會袲不當有齊侯單伯送王姬不應作逆夜恆星不見夜中星隕如雨二夜字不應異文公伐齊納子糾不應無子字齊人殱于遂不應作瀐曹羈出奔陳赤歸于曹與鄭忽出奔衛突歸于鄭同例會洮不應有鄭世子華欒書救鄭不應作侵鄭召公來錫公命不應作賜命襄公五年救陳不應作莒子邾子滕子薛伯會虢之衛齊惡不應作石惡齊欒施不應作晉叔孫婼不應名舍公會齊侯盟于黃不應作晉侯衛趙陽不應作晉趙陽皆極精核至于蔑為姑昧知昧為蔑轉而不知經刪姑字為隱公諱冬宋人取長葛知經傳不符而不知宋以先王之後用商正取長葛在建酉之月則此冬而彼猶秋亦間有未密之處然其可取者則多矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:af2f37aa969407cf6f7456bd2f28659e24f8f2334ce820ce6312edbf7cfd0616
