  - {type: page-break, offset: 0, content: '', id: KR1e0103_WYG_000-1a, image: WYG0176/WYG0176-0409a.png}
body:
  text: 春秋簡書刋誤春秋類提要臣等謹案春秋簡書刋誤二卷國朝毛竒齡撰竒齡作春秋𫝊以春秋經文為據古之簡書以左𫝊所述為據古之䇿書故此編刋經文之誤以簡書為名皆以左𫝊為主而附載公榖之異文辨證其謬因胡安國𫝊多從榖梁并安國亦排斥之其舎左氏而從公羊者惟襄公十四年衞侯衎出奔齊一條耳攷左𫝊雖晚出而其文實竹帛相𫝊公榖雖先立于學宫而其初皆由經師口授或記憶之失真或方音之逓轉勢所必然不足為怪竒齡必以為有意改經至於作于饗作享亦縷論之殊為深詆然其論㑹袲不當有齊侯單伯送王姬不應作逆夜恒星不見夜中星隕如雨二夜字不應異文公伐齊納子糾不應無子字齊人殱于遂不應作瀐曹羈出奔陳赤歸于曹與鄭忽出奔衞突歸于鄭同例㑹洮不應有鄭世子華欒書救鄭不應作侵鄭召公來錫公命不應作賜命襄公五年救陳不應作莒子邾子滕子薛伯㑹虢之衞齊惡不應作石惡齊欒施不應作晉叔孫婼不應名舎公㑹齊侯盟于黄不應作晉侯衞趙陽不應作晉趙陽皆極精核至于蔑為姑昧知昧為蔑轉而不知經刪姑字為隠公諱冬宋人取長葛知經𫝊不符而不知宋以先王之後用商正取長葛在建酉之月則此冬而彼猶秋亦間有未密之處然其可取者則多矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d711e2c84e62c860655e983e728b4e579aaab30502e582f01f1e006648229104
