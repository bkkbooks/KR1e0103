body:
  text: 春秋簡書刋誤目錄卷一隱公十六條桓公十六條莊公二十八條欽定四庫全書春秋簡書刋誤卷一翰林院檢討毛竒齡撰漢藝文志有春秋古經十二篇先儒目之為簡書即聖經也其分十二篇者以春秋十一公每公得一篇則十二篇也苐其書不知亡于何時唯三傳傳經則各有經文載于其中漢初行四家之學有公羊穀梁鄒氏夾氏而鄒夾無傳祗公穀二學早立于學官而諸生傳之顧兩家杜撰目不見策書徒以意解經故經多誤字而公羊且復以里音市語讕謱其間其所存聖經己非舊矣及左傳行世則始知有簡書正文冠策書首故當時左公穀三傳俱著竹帛而左之為傳先于公穀漢人亦稱左氏為古學公穀為今學而其如左氏晚出公穀立學反先于左氏是以治古學者雖有張蒼賈誼張敞賈逵服䖍輩不下于董仲舒公孫𢎞輩之治今學而諸生膠固競立門戸即加以前漢劉歆後漢韓歆兩歆之争必不能救左氏膏肓之目而策書簡書總無聞焉夫左氏之傳即是策書左氏之經即是簡書故夫子筆削祗襲魯國之簡書以為之本即絶筆以後猶有舊簡書一十七條見于左傳則哀十四年獲麟以前其為真簡書而以之作夫子之聖經公羊穀梁俱無與也乃宋胡安國自為作傳而元人創八比法直用其書以取士立學官而著功令明代遵之每經凡四題而春秋一經則專以胡氏四傳代夫子之經而聖經已亡然且其所載傳中者原非簡書祗以穀梁本為據而穀之與公如狼狽屭屓彼此呼吸與左氏之所載者全不相合而於是聖經亡即簡書亦亡矣予著春秋傳念不及此亦仍以胡氏所載為聖經原本而反標三傳諸字同異于其下東陽李生紫翔者著春秋紀傳早已行世及之官嶺表疑予傳聖經之有未覈屬王生虎文問及之予乃命猶子文輝取三傳聖經之各異者以簡書為主而各註所誤而明標之名曰刋誤嗟乎前人之誤其所厚賴于後人之刋之者豈止是與隱公一十六條公及邾儀父盟于蔑元年邾公羊作邾婁後同蔑公羊穀梁俱作昧邾本附庸國武王克商封顓頊之後名俠者于邾地當時稱邾俠則邾祗一字明矣公羊多一字曰邾婁據舊解邾人語聲歇末必有婁字猶呉人發聲有勾字越人發聲有於字曰勾呉於越類然經文亦有之如檀弓邾婁考公之喪哀十三年於越入呉類特此必不然者穀梁亦先左氏出而經文始終祗一邾字此非左氏改本又明矣或曰五等爵國無兩字惟附庸有之如須句顓臾類則邾在桓年已與齊桓相盟㑹曾受王命進子爵自莊十六年後凡經文俱書邾子則亦當改附庸兩字之例而公羊後經必加婁字于子字之上又何以稱焉蔑亦名姑蔑即魯國卞縣南姑城也昧與蔑聲轉之誤無駭帥師入極二年駭穀梁作侅後同莊子侅溺于馬氣謂咽食也無駭展氏名無考紀裂繻來逆女二年裂公穀作履履裂聲轉紀子帛莒子盟于密二年帛公穀作伯據左傳杜註裂繻紀大夫子帛者裂繻字也公羊以帛字作伯字而不能傳曰無聞焉爾穀梁有二說一以伯字連下讀曰紀子紀君也伯者長也伯莒子者謂其盟時長莒君而使為伯也一以伯字連上讀曰紀君長于莒君而為盟則從來書盟並不列長次于文中蔡衞滕薛儼然争長次而書並不及况以無據之長次可上可下而臆解經文豈可為訓乃胡氏不知何據謂經文有闕一如甲戌己丑之兩及而俗儒解者謂子伯皆爵名一人而兩爵自必有誤夫子因闕疑而慎言其餘則公穀所誤緣不見策書其擬議固不足怪胡氏豈不讀左傳而其說如此此必謂左氏不足據耳夫不讀左傳當讀他書許氏說文明曰繻帛俱是繒而徐註以繻為傳符之帛謂關門傳符當用帛邊以為信則繻名帛字在杜註原自可據况經字有必不可易者不讀漢書乎終軍出關關吏予軍繻而軍棄之舊制凡關吏譏察出入必書帛為符裂而分之曰裂繻則此一裂字在左氏受簡書時必不豫知有終軍之事而改此文而終軍在漢武朝亦並不知春秋之更有左氏而故造此事以求隂合于簡書之字此則履之必為裂帛之必不可為伯有斷然者况胡氏無學既拾人之誤而又自坐以大誤夫欲解聖經當亦取聖經而全讀之單讀此經則紀子者子焉爾或為子或為伯當慎言焉爾乃桓之六年明曰公㑹紀侯于郕又曰紀侯來朝十有三年又曰公㑹紀侯鄭伯戰齊師十七年又曰公㑹齊侯紀侯盟于黃至莊四年直曰紀侯大去其國而紀亡矣則是子雖闕疑雖慎言亦不應荒心喪志前後繆亂至于如此如此而猶欲傳經何可矣尹氏卒三年尹左傳作君說見毛氏傳塟宋穆公三年穆公穀作繆後同穆繆通字禮記大傳序以昭繆衞州吁弑其君完四年州穀作祝此則有意變異矣州吁見諸經誰作祝者此不過字聲之轉而齊魯間人語音有然如雜記齊人有祝雞翁呼雞為州州亦呼作祝祝類今漫入經字亂矣祝有讀咒者亦作訓即訓詛也然是晝聲州吁豈得稱晝吁乎公矢魚於棠五年矢公穀作觀杜註矢陳也設張也謂張施捕魚之備而觀其所獲與莊子濠上觀魚祗視其游泳不同故此經有策書載臧僖伯諫詞一百六十餘字皆公穀所未見者若止觀魚則僖伯此諫為多事矣且既有諫詞則其語自有著落諫明以蒐苖獮狩與山林川澤之實為捕魚發論則自非觀看之謂杜甫觀打魚歌不得謂觀魚歌也又且簡書與策書照應策書明曰遂往陳魚而觀之即又述簡書一語書曰公矢魚于棠書者簡書即此經也然則經本如是矣衞師入郕五年郕公作盛後同郕與盛原俱讀作成然郕是國名史記管蔡世家稱郕叔武為文王之子武王之母弟則同姓國也雖他無所見然文十二年郕太子奔魯經書郕伯來奔則固以伯爵而厯見于經者乃復訛作盛是宋可作送衞可作彗史文皆市牒矣鄭人來渝平六年渝公穀作輸此不過字形之誤雖異詁而義實可通渝者變也輸者納也按隱公為太子時魯惠曾與鄭戰于狐壤而隱公見獲未經通好至是鄭始來求成是變怨為好所謂更成亦所謂輸成也但更而後輸更可包輸輸不可包更則渝盟勝矣若公穀改輸而仍解作渝曰輸墮也且又以墮成為不果成則不特字義乖即事實亦變總由不見策書而憑臆卜度故至此冬宋人取長葛六年冬左氏傳文作秋傳文作秋而經文原書冬杜氏曰以秋取而冬始告也鄭伯使宛來歸祊八年祊公穀作邴後同祊本鄭邑周宣封鄭時有助祭泰山湯沐之邑曰祊若邴則說文曰宋下邑在泰山並非一地揣其意不過以同在泰山之邑可借此作異而不知張州李縣有難通者公及莒人盟于浮來八年浮來公穀作包來不可解挾卒九年挾公穀作俠公㑹齊侯于防九年防公作邴防又作邴不可解祊是鄭邑防是魯邑邴是宋邑並未相通據舊註魯防邑在瑯琊華縣東南臧武仲據防豈得據他國之邑此皆無足道者夏公㑹鄭伯于時來十一年夏字下公穀俱有五月二字時來公作祁黎時祁同音來黎聲轉總是謬誤即來原可讀作黎如商國萊侯即黎侯呉人伐州來即楚州犂之采類然公之讀犂則仍是里音如如棠矢魚傳以得利為登來云齊人口語如是其非史文瞭然耳桓公一十六條把侯來朝二年把公穀俱作紀公㑹杞侯于郕三年把公作紀郕公作盛此與前文俱是杞不是紀公穀誤說見毛氏傳天王使仍叔之子來聘五年仍穀作任不可考螽五年螽公作􅏑後同公㑹紀侯于郕六年郕公作成後同此郕是魯邑與前郕國不同故左氏傳文亦作成齊人衞人鄭人盟于惡曹十一年左傳有齊衞鄭宋四國反疑經闕宋人非也說見毛氏傳公㑹宋公于夫鐘十一年鐘公作童公㑹杞侯莒子盟于曲池十二年把公穀作紀曲池公作毆蛇此亦是把不是紀公穀誤夫童毆蛇不可考公㑹宋公于虚十二年虚公作郯虚為宋地郯則魯地矣總由不見策書不得真事實但知魯宋相㑹則其地可宋亦可魯因别改一魯地而不知狡獪伎倆其拙而可笑止如此鄭伯使其弟語來盟十四年語穀作禦語禦通字如越絶語兒鄉即禦兒鄉類宋人以齊人蔡人衞人陳人伐鄭十四年公以蔡人列衞人下此非蔡衞爭長之時不必有次第可據但作異耳公㑹齊侯于艾十五年艾公作鄗穀作蒿公㑹宋公衛侯陳侯于袲伐鄭十五年公于宋公上加齊侯二字袲公作侈公穀作異總不出人名地名字形字聲之間至最狡獪者則列國盟㑹次第稍一顛倒亦原無可考至此經乃忽增齊侯二字于諸侯㑹伐之首以為此必無証據可掉臂耳不知此一㑹伐是魯宋主謀合諸國以納鄭突伐鄭忽者齊世德鄭忽黨忽而讎突其在前忽突出入無不齊助忽而魯助突忽突不兩立齊魯不並袒豈有魯謀納突于以伐忽而齊肻與于其間者公穀與胡氏絲毫不識經并不識經之前後而左塗右抹兒盜沸錫思掩不備乃不虞動輒滅手至于如此嗟乎可廢然矣公㑹邾儀父盟于趡十七年㑹公穀作及夏五月丙午及齊師戰于奚十七年公無夏奚穀作郎公與夫人姜氏遂如齊十八年公無與字莊公二十八條單伯送王姬元年送公穀作逆送之為逆此公穀之以字形誤者周制王姬下嫁諸侯必以同姓諸侯為之主婚時莊王王姬下嫁齊襄使我公主之故單伯送之至魯以送必上卿單伯者正王國上卿爵也公穀誤送作逆實反經無理乃妄為說曰迎王姬本我魯事此一單伯必魯卿之受命于天子者夫大國三卿雖當命于天子然並不曾有公伯諸爵稱于簡冊且單本畿内采地而世以采為氏者春秋稱單伯單子單穆公單成愆無非王官並無一魯卿得參預其間其謬誤固不待言特揣其鄙意必因文十四年單伯如齊齊人執單伯并執子叔姬以為單伯必魯卿魯使故得與我姬並執是必逆王姬之單伯與叔姬同執之單伯前後一人皆此魯卿而不知策書明云魯襄仲使告于王請以王命求叔姬故王遣單伯如齊而齊商人以弑逆之賊并抗王命而執之是前後單伯簡策顯然公穀目不見簡策而胡氏以盲工事瞽師總皆不見宜乎兩傳兩遵之也且此單伯必非文十四年之單伯莊元至文十四約八十餘年其斷非一人又可知也公次于滑三年滑公穀作郎齊師遷紀公將㑹鄭伯與謀救紀而鄭伯以國難辭之故次于滑則公己出國與鄭通說非郎明矣特舊註滑是鄭地則不然當是同姓一小國而與鄭隣者觀後鄭伐滑則非鄭地秦人入滑而晉曰伐我同姓則同姓國矣其後齊桓㑹幽有滑伯在許男下或即此耳夫人姜氏享齊侯于祝邱四年享公穀作饗公及齊侯狩于禚四年禚公穀作郜前二年㑹禚惟公郜而穀不然今公穀同不可解郳黎來來朝五年黎左作犂别出字齊人來歸衛俘六年俘公穀與左氏傳文俱作寳簡書是俘而左氏策書文原是寳字杜氏謂公穀與策書俱然此必經文有誤者且云俘囚也俘必以人而衛所歸是寳物因以為疑而孔氏正義則直云寳與保古字通用此以俘保字形近致誤則笑話矣按爾雅俘取也其註云如書言俘厥寳玉則囚人曰俘取寳玉亦曰俘此正俘寳玉也其云書言者以書序湯既勝夏遂伐三朡俘厥寳玉誼伯誼仲作典寳則獻俘作書而反以典寳名篇簡書專言俘與策書專言寳俱可通矣杜孔偶不見及耳夏四月辛卯夜恒星不見夜中星隕如雨七年隕公作霣後凡隕字皆同辛卯夜夜字穀作昔莊子昔昔夢為國君謂夜夜也樂府夜夜曲作昔昔鹽然此經兩夜字而上夜作昔下夜不作昔豈有此理甲午治兵八年治公作祠古治兵振旅皆以教戰然必于出師之際告廟行事故亦稱祠兵今師次于郎徒以俟期之故選日教戰即有告亦載主耳公穀稱祠兵左以為治兵于廟皆非策書文也且我師以正月次郎甲午者即正月中日耳古干支皆記日無記年與月者以此月出師即以此月習戰而公羊曰久胡氏曰役久何以解之夏公及齊師圍郕郕降于齊師八年郕公作成公初以郕作盛郕國也後以郕作成郕邑也今圍者郕國而亦作成且自為說曰成本是盛而以諱滅同姓故作成則成之與盛皆字音相同之别出字也何諱何不諱寃哉公及齊大夫盟于蔇九年蔇公穀作暨夏公伐齊納子糾九年子糾公穀作糾子糾去子字無理孔氏正義云案今定本經文糾字上有子字則在唐時尚有經文定本今亡之矣乃胡氏直曰糾不書子者明糾不當立也則請讀後經九月齊人取子糾殺之此公穀與左氏文總無異也豈夏不當立九月當立耶荆敗蔡師于莘以蔡侯獻舞歸十年舞穀作武齊侯宋人陳人蔡人邾人㑹于北杏十三年齊侯穀作齊人說見毛氏傳宋人齊人邾人伐郳十五年郳公作兒郳即前郳黎來之郳也公前作郳此作兒不可解㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽十六年㑹上公有公字許男下公穀有曹伯二字不可考齊人執鄭詹十七年詹公作瞻後同齊人殱于遂十七年殱公作瀐齊人不死于水而死于陸且此時無海戍又無呉人水犀軍即晉陽之灌亦屬後起誰為瀐之乃何休解曰投藥于水中使飲食而死則瀐者沒也藥死而曰沒死非信史矣齊人伐戎二十年戎穀作我無傳不可考春王正月肆大𤯝二十二年𤯝公作省大省原不可解何休解曰謂子卯日也夏商以子卯日亡此日當省但居喪不避子卯日桓有母喪而避子卯而不哭則過度矣肆者過度也則尤不可解按檀弓子卯不樂士喪禮既殯之後朝夕哭不避子卯則子卯二日吉事避而喪事不避禮固有之然未聞名為省也且桓雖不念母然子卯不哭出自何書此經與此傳不問簡策從未有子卯二字稍見行列不知東漢何劭公何由知之如此而欲作公羊墨守不亦恑哉陳人殺其公子御寇二十三年御公穀作禦御禦通字列御寇亦作禦寇冬戎侵曹曹羈出奔陳赤歸于曹二十四年郭公二十四年左以此兩經分四節公穀以戎侵曹曹羈出奔陳作一節赤歸于曹郭公連作一節此經失策書故左氏無傳但左氏分四節者以一節為一事不相干也公穀皆以侵曹奔陳為一節一事赤歸郭公又一節一事其以侵曹奔陳為一節者謂戎來侵曹曹君欲親戰而曹大夫名羈者三諫不聴去而奔陳此一事也赤歸郭公又一節者謂曹君為戎所殺適有失國之君名赤者從外歸于曹而曹無名赤之人問之葢郭公也此又一事也于是何休解曰郭公有地之君失國來曹當書出奔今書歸者一似此人之來有類乎所殺之曹君諡之為郭公而還歸于曹者而其實則但是赤歸不是曹君歸其不書奔者從微者例也則此一郭公既是郭君又且假之為曹君之諡或為赤郭公或為曹郭公無論諡法無郭名即曹君射姑前年書卒其子僖公並未見殺兒曹嘔啞了無根據乃范寗註穀梁較勝于休且其時有徐乾薄氏輩兩相論辨而終不能變其說六經皆齊諧矣唯杜氏註左傳直云曹羈葢曹世子也先君既塟而不稱爵者以微弱出奔故曹人不能赴也赤即曹僖公也葢為戎所納故曰歸也則曹羈出奔陳赤歸于曹一如桓十一年鄭忽出奔衛突歸于鄭簡書前後書法恰合此真以經解經之最善者然猶有據史記世家與年表謂曹僖名夷不名赤以為質難總謂不如闕疑耳若正義載賈逵說謂羈是曹君赤是曹公子之為戎女出者故戎侵曹逐羈而納赤此說與杜氏同而較詳于杜且頗有理焉知非東漢初原有師承而為杜氏所據者若此者又何必過難焉春公伐戎二十六年公無春字桓無秋冬定無正月便云有意削之今莊并無春耶公㑹齊人宋人救鄭二十八年公有邾婁人三字在宋人下冬築郿二十八年郿公穀作微穀梁註引左傳作麋今左亦作郿春新延廐二十九年廐公穀作廏師次于成三十年左無師字此我師之救鄣者也左氏無策書并失師字冬十月己未子般卒三十二年已公穀作乙無考春秋簡書刋誤卷一
