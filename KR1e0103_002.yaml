body:
  text: 春秋簡書刋誤目録卷二閔公一條僖公三十二條文公二十二條宣公十五條成公十五條襄公三十七條昭公四十四條定公二十一條哀公十一條欽定四庫全書春秋簡書刋誤卷二翰林院檢討毛竒齡撰閔公一條公及齊侯盟于落姑元年落公榖作洛僖公三十二條邢遷于夷儀元年夷公作陳後同公會齊侯宋公鄭伯曹伯邾人于柳元年柳公作朾公敗邾師于偃元年偃公作纓公子友帥師敗莒師于酈獲莒拏元年酈公作犂榖作麗虞師晉師滅下陽二年下公榖作夏齊侯宋公江人黃人盟于貫二年貫公作貫澤按貫宋地梁國蒙縣有貫城即貫城也然並無澤公子友如齊涖盟三年公子下榖多季字涖公榖作蒞後同齊人執轅濤塗四年轅公榖作袁後陳轘頗亦同公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳四年兹公作慈後同會王世子于首止五年止公榖作戴後同公會齊侯宋公陳世子欵鄭世子華盟于寧母七年寧榖作寧寧母即髙平泥母亭寧泥寧總是音轉之誤曹伯斑卒七年斑公作般斑原通般經顔班魯班皆作般即斑亦然內則馬黑脊而般臂漢郊祀歌般般之獸公會王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟八年陳世子欵下公有鄭世子華此因前年寧母之會有陳世子欵鄭世子華兩人故此亦攙入之不知寧母之會以鄭世子為齊所惡故鄭使世子請盟于齊則世子與會實鄭伯使之也今盟洮以謀王室因鄭伯新服未得徴及故乞盟向使世子得與會則鄭伯既使其子不必又身乞盟矣此皆與本經前後不相顧者春王正月宋公御説卒九年正月公榖作三月御榖作禦正三字形之誤或謂是年夏齊桓葵邱之會宋公子襄公新立而經稱宋子以宋公未葬故有是稱則必會期與葬期相近似須三月不知諸侯五月始葬雖春正至夏未晚也周制天子諸侯未葬皆可以改服行事晉平之改服會湨梁亦猶此也觀此則蘇軾之據晉平必不改服因以責康王冕服非周公之禮真無狀矣甲子晉侯詭諸卒九年甲子公作甲戌詭左舊本作佹總不可考此非長厯所能推者晉里克殺其君之子夷齊九年殺公作弒左傳以先君未葬故稱殺與後弒其君卓正有别冬大雨雪十年雪公作雹春王三月庚午日有食之十二年三月榖作正月季姬及鄫子遇于防使鄫子來朝十四年鄫公榖作繒後同會陳人蔡人楚人鄭人盟于齊十九年會上公有公字宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂二十一年盂公作霍榖作雩又榖别本作宇盂雩宇聲誤而霍又雩形之誤總宋地而已齊侯伐宋圍緡二十三年緡榖作閔後同公會莒子衛寧速盟于向二十六年速公作遫後衛侯速仲孫速鄭遊速皆同齊人侵我西鄙公追齊師至酅勿及二十六年酅公榖作嶲勿左作不楚人滅夔以夔子歸二十六年夔公作隗隗本狄族赤狄之以國為氏者晉叔隗季隗是也若夔本蠻國與楚同姓皆祝融之後故此䇿書以不祀祝融滅之而又改作隗謬矣公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫二十八年榖無齊侯二字天王狩于河陽二十八年狩榖作守巡狩可通守搜狩而通守即是字誤會王人晉人宋人齊人陳人蔡人秦人盟于翟泉二十九年會上公有公字翟公作狄衛遷于帝邱三十一年于榖作於鄭伯捷卒三十二年捷公作接晉人及薑戎敗秦于殽三十三年左榖秦下有師字公伐邾取訾婁三十三年訾婁公作叢榖作訾樓文公二十二條楚世子商臣弒其君頵元年頵公榖作髠公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴二年隴公榖作斂聲轉晉陽處父帥師伐楚以救江三年公榖無以字王使召伯來會葬五年召伯榖作毛伯晉侯歡卒六年歡公作歡晉狐射姑出奔狄六年射榖作夜取須句七年句公作朐須句即東郡須昌與齊郡臨朐不同晉人及秦人戰于令狐晉先蔑奔秦七年蔑公作昧奔上有以師二字據䇿書晉襄公卒使先蔑迎公子雍于秦將立之已而立靈公遂背先蔑而拒秦于令狐其曰戰者以秦晉有隙且是時秦多以徒衛送雍因之趙盾輩以師禦之若先蔑則並無師也左氏䇿書有誤有先蔑將下軍語以使秦之人而忽作拒秦之帥已不可解公竟以師字攙入經文益貿貿矣公子遂會雒戎盟于暴八年雒公作伊雒公孫敖如京師不至而復丙戌奔莒八年公無而字楚子使椒來聘九年椒榖作萩爾雅椒本作茮此又以茮誤萩者但楚詞申椒楚大夫椒舉類皆作椒無别出字楚子蔡侯次于厥貉十年厥公作屈楚子伐麋于一年麋公作圈麋本蠻國之有名者䇿書稱麋子其國在下雋巴陵諸地與卷讀圈之在河南郡者大别叔仲彭生會晉郤缺于承筐十一年公榖無仲字筐公榖作匡秦伯使術來聘十二年術公作遂術原通遂學記術有序即遂有序月令審端經術即審端徑遂但人名須有專字况此即西乞術尤秦穆三帥之有名者臯陶作咎由以音同也今術之與遂則終是變音字矣向使稱公子遂為公子術其能從乎季孫行父帥師城諸及鄆十二年鄆公作運後同世室屋壞十三年世室左榖皆作大室大室是周公廟室世室則伯禽廟也左氏但作大室不指何公廟榖梁以為伯禽有大室又謬矣公如晉衛侯會公于沓十三年公會下無公字公及晉侯盟公還自晉鄭伯會公于棐十三年榖還上無公字棐公作斐後同公子遂及齊侯盟于郪邱十六年郪公作犀宋人弒其君杵臼十六年杵公作處後齊侯杵臼卒亦同古人名杵臼多矣此豈可以音同出别字乎葬我小君聲薑十七年聲公作聖宣公十五條晉趙穿帥師侵崇元年崇公作栁崇秦之與國即文王伐崇地也公改栁而曰天子之邑則與䇿書晉將求成于秦而先侵崇以要其成為不合矣且晉固無道然伐天子邑亦安據乎况後經有秦師伐晉報侵崇之役則經且不識而故為作異多見其陋劣耳晉趙盾弒其君夷臯二年臯公作嗥楚子伐陸渾之戎三年公榖俱無之字陸渾公作賁渾後同齊髙固來逆子叔姬五年左無子字夫人嬴氏薨八年嬴公榖作熊楚人滅舒蓼八年蓼公作鄝葬我小君敬嬴八年敬嬴公榖作頃熊嬴熊氏固不可考若敬則諡也敬嬴係文妾為宣之生母使宣公不以為母魯國不以為夫人則已矣既己為母為夫人而立諡則亦何惡于嬴而致有此作者好異徒欲于人名地名别出一音近形近之字而不知此一字是諡有不可者按諡法甄心動懼曰頃婦人無此諡陳殺其大夫泄冶九年泄公榖作泄公孫歸父帥師伐邾取繹十年繹公作蘱楚子陳侯鄭伯盟于辰陵十一年辰陵榖作夷陵辰陵陳地榖改夷陵而范寧注作齊地則與楚鄭陳三國盟會何涉矣榖梁以為辰必楚地如辰陽之辰故以南郡之夷陵别出之范注又誤耳納公孫寧儀行父于陳十一年寧公作寧齊師伐莒十三年公作伐衛伐莒有前事伐衛則不知何事不可考晉殺其大夫先縠十三年縠榖作榖仲孫蔑會齊髙固于無婁十五年無婁公作牟婁寧母亦作寧無以齊人讀無為牟母總里音也成周宣榭火十六年榭公榖作謝火公榖作災成公十五條王師敗績于茅戎元年茅公榖作貿聲轉帥師會晉郤克衛孫良曹公子首及齊侯戰于鞍二年首公榖作手公别本又作午及國佐盟于袁婁二年袁榖作爰晉郤克衛孫良夫伐牆咎如三年牆公作將榖作牆叔孫僑如會晉荀首于縠五年首公作秀晉欒書帥師救鄭六年救公作侵此晉楚爭鄭故前經書楚公子嬰齊帥師伐鄭而後經即書晉欒書帥師救之如此而又改救作侵則不特䇿書大篇俱可廢即聖經無前後文矣然則斷爛之説二傳有之宋人不足怪也天子使召伯來錫公命八年錫别本作賜此簡書原是錫字惟胡傳本聖經誤作賜字反將左傳本俱改作賜而以錫為别出字謬矣按莊元年王使榮叔來錫桓公命文元年天子使毛伯來錫公命皆是錫字周制諸侯即位天子頒以命圭使朝時合瑞謂之錫命此八年始錫故杜氏謂之為緩然其禮則昭然者榖梁胡氏不知禮并不知春秋一曰不正再曰不王總是妄説見文元年傳冬十月十年公無此三字晉侯使郤犨來聘十一年犨公作州後同公會晉侯衛侯于瑣澤十二年瑣澤公作沙澤曹伯廬卒于師十三年廬左作盧晉侯執曹伯歸于京師十五年公歸下有之字晉人執季孫行父舍之于苕邱十六年苕公作招公孫嬰齊卒于貍脤十七年脤公作軫榖作蜃晉侯使士魴來乞師十八年魴公作防後同襄公三十七條晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫元年厥公作屈鄫公作合夫人姒氏薨四年姒公作弋後姒氏卒葬定姒皆同會吳于善道五年道公榖作稻公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳五年曹伯下公榖有莒子邾子滕子薛伯此楚伐陳而晉會諸侯以救之也方秋會戚時原有莒邾滕薛四國然已經歸國而遣戍陳矣及冬楚再伐陳而又有是會則其不必與前會相同可知也不然前會有吳人鄫人而此亦無之何耶鄭伯髠頑如會未見諸侯丙戌卒于鄵七年頑公榖作原鄵公榖作操鄭人侵蔡獲蔡公子燮八年燮公作濕後同宋災九年災公作火後陳災亦同據公傳文自言外災不書此何以書則明是災不是火豈經本又别出耶遂滅逼陽十年逼榖作傅逼陽地在彭城傅陽縣則傅亦地名之别出者盜殺鄭公子騑十年騑公榖作斐同盟于亳城北十一年亳公榖作京京亳皆鄭地不過各出一地耳楚人執鄭行人良霄十一年良霄榖作良宵莒人伐我東鄙圍台十二年台榖作邰夏取邿十三年邿公作詩同音鄭公孫蠆會吳人于向十四年蠆公作囆後鄭伯蠆卒亦同衛侯出奔齊十四年衛侯下公有衎字諸侯出奔例書名此簡書闕文公羊補之是也齊侯伐我北鄙圍成十六年成左作郕同字邾子牼卒十七年牼公榖作瞷齊侯伐我北鄙圍桃十七年桃公作洮齊髙厚帥師伐我北鄙圍防十七年左氏無齊字齊師伐我北鄙十八年齊師榖作齊侯諸侯盟于祝柯十九年柯公作阿齊侯環卒十九年環公作瑗鄭殺其大夫公子嘉十九年嘉公作喜陳侯之弟黃出奔楚二十年黃公榖作光後同公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨二十二年邾子下公榖有滕子邾畀我來奔二十二年畀我公作鼻我叔孫豹帥師救晉次于雍榆二十三年榆公榖作渝公孫夏帥師伐陳二十五年夏公作囆吳子遏伐楚門于巢卒二十五年遏公榖作謁叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋二十七年奐公作瑗後同衛侯之弟鱄出奔晉二十七年鱄榖作專猶吳專諸之為鱄諸也仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞二十九年儀公作齊莒人下公榖有邾人楚子使薳罷來聘三十年罷公作頗宋災宋伯姬卒三十年伯姬上公榖俱無宋字天王殺其弟佞夫三十年佞公作年聲轉叔弓如宋葬宋共姬三十年共姬上榖無宋字昭公四十四條叔孫豹會晉趙武楚公子圍齊國弱宋向戍衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢元年弱公作酌齊惡公作石惡罕公作軒虢公作漷榖作郭衛石惡即石碏之後以上卿屢與盟會前五年衛人討寧氏之黨因出奔晉經于襄二十八年書夏衛石惡出奔晉是也公羊但知改地名人名以見異而石惡又屢見盟會遂改作石惡但不知于數年前之經何以漠然不一觀也吾故曰公榖胡氏皆全然不知春秋為何物者非妄語也晉荀吳帥師敗狄于大鹵元年大鹵公榖俱作太原大鹵即太原故左氏䇿書亦曰敗狄于太原但簡書是大鹵何必又爾楚子麋卒元年麋公榖作卷滕子原卒三年原公作泉遂滅賴四年賴公榖作厲厲賴聲轉通字如漢書無賴作無厲可見仲弓帥師敗莒師于蚡泉五年蚡公作濆榖作賁叔孫婼如齊涖盟七年婼公作舍聖經時本皆因此致誤今改正叔孫婼即叔孫昭子叔孫豹之子也春秋䇿書或稱婼或稱昭子或稱叔孫氏並不名舍其得名舍者或叔孫武叔之子叔孫舒舒舍轉音可以别出然其人不見于春秋惟哀草六年左傳附録有之此時未能與國事也公羊好作異誤取式叔之子作昭子而胡氏聖經則又誤襲公羊本而自元迄今遂至簡䇿二書絶不相對者凡七經亦慘極矣今逐一改正真一快事後不再贅齊欒施來奔十年齊公作晉此齊之欒氏也欒施即公子欒之孫字子旗者與髙鮑皆強族稱欒髙氏今為子良同族所逐因而來奔公羊目不見䇿書祇知晉有欒氏齊未必有遂改齊作晉此真罔誕可笑之甚者説見毛氏傳季孫意如叔弓仲孫貜帥師伐莒十年意如公作隱如後同叔孫婼如晉葬晉平公十年婼公作舍聖經時本亦作舍今改正十有二月甲子宋公成卒十年成公作戍後杞伯成卒於會許男成卒皆同春王二月叔弓如宋葬宋平公十一年二月公作正月二月葬尚速况正月耶仲孫貜會邾子盟于祲祥十一年祲祥公作侵羊季孫意如會韓起至于厥憗十一年厥憗公作屈銀楚師滅蔡執蔡世子有以歸十一年有榖作友楚殺其大夫成熊十二年熊公作能榖作虎公子憖出奔衛十二年憖公作整憖之為銀以聲今為整又以形亦何必然楚公比至弒其君于乾溪十三年溪榖作溪楚公子棄疾殺公子比十三年殺榖作弒公子比弒君賊且名未列于諸侯烏得稱弒特棄疾非討賊耳正義謂此殺字如蔡人殺陳他齊人殺無知衛人殺州吁公子瑕之類公子夷末卒十四年末公作昧蔡朝吳出奔鄭十五年朝公作昭無出字楚子誘戎蠻子殺之十六年蠻公作曼後同晉荀吳帥師滅陸渾之戎十七年公榖無之字曹公孫會自鄸出奔宋二十年鄸榖作夢盜殺衛侯之兄縶二十年縶公榖作輒宋華亥向寧華定出奔陳二十年寧公作寧叔輒卒二十一年輒公作痤蔡侯朱出奔楚二十一年朱榖作東大搜于昌間二十二年間公作姦叔孫婼如晉二十三年婼公作舍聖經時本亦作舍今改正晉人執我行人叔孫婼二十三年婼公作舍聖經時本亦作舍今改正吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧二十三年父公作甫逞公作楹榖作盈公如晉至河有疾乃復二十三年公至河下有公字婼至自晉二十四年婼公作舍上有叔孫字聖經時本亦然今改正䇿書述簡書曰二月婼至自晉則無叔孫字可知也此與十四年春意如至自晉無季孫字書法正同但不意二傳全不見䇿書且全不讀聖經如此杞伯郁釐卒二十四年郁公作鬱叔孫婼如宋二十五年婼公作舍聖經時本亦作舍今改正叔詣會晉趙鞅宋樂大心至于黃父二十五年詣公作倪後同大心公榖作世心後同有鸜鵒來巢二十五年鸜公作鸛己亥公孫于齊次于陽州二十五年己亥榖作乙亥陽公作楊叔孫婼卒二十五年婼公作舍聖經時本亦作舍今改正鄭伯寧卒二十八年寧公作寧後滕子寧卒亦同季孫意如會晉荀躒于適厯三十一年躒公榖作櫟後同黑肱以濫來奔三十一年肱公作弓仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周三十二年世叔榖作大叔莒人下公有邾婁人榖有邾人定公二十一條二月辛卯邾子穿卒三年二月公榖作三月仲孫何忌及邾子盟于拔三年拔公作枝蔡公孫姓帥師滅沈四年姓公作歸姓後同公及諸侯盟于臯鼬四年臯鼬公作浩油蔡侯以吳子及楚人戰于柏舉四年柏舉公作伯莒榖作伯舉吳入郢四年郢公榖作楚春王三月辛亥朔日有食之五年三月公作正月齊侯衛侯盟于沙七年沙公作沙澤晉士鞅帥師侵鄭八年士鞅公作趙鞅公會齊侯于夾谷十年夾谷公榖作頰谷後同齊人來歸鄆歡龜隂田十年榖田上有之字宋公子地出奔陳十年地公作池後同齊侯衛侯鄭遊速會于安甫十年安甫公作鞍宋公之弟辰暨仲他石彄出奔陳十年暨字下公榖俱有宋字公會齊侯盟于黃十二年齊侯公作晉侯魯定與齊景同謀叛晉故為此盟乃又改齊作晉茫然不知矣荀寅士吉射入于朝歌以叛十三年荀寅下公有及字衛趙陽出奔宋十四年衛公榖俱作晉趙陽衛大夫趙氏名陽者以其黨于公叔文子之子公叔戍故衛侯并逐之杜氏謂趙陽即趙黶之孫而正義據世本謂懿子兼即趙黶生昭子舉舉生趙陽是顯有名據而公榖極陋祇知晉有趙氏他國未必有遂奮筆改此此與前齊欒施來奔改晉欒施同一笑話祇前榖不改而此即同改鶼鶼有異翼與二月楚公子結陳公孫他人帥師滅頓以頓子牂歸十四年二月公作三月公孫作公子牂作牄於越敗吳于檇李十四年檇公作醉檇原有醉音公會齊侯衛侯于牽十四年牽公作堅又作掔鄭罕達帥師伐宋十五年罕公作軒此鄭公子罕後為鄭穆七族之一焉得有别出字齊侯衛侯次于渠蒢十五年渠蒢公作蘧蒢哀公十一條鼷鼠食郊牛元年榖郊牛下有角字季孫斯叔孫州仇帥師城啓陽三年啓公作開此漢儒避景帝諱而未改復者春王二月庚戌盜殺蔡侯申四年二月公作三月殺公榖作弒亳社災四年亳公作蒲此勝國之社以舊都商亳故名焉得有别出字春城毗五年毗公作比又作芘城邾瑕六年瑕公作葭齊陳乞弒其君荼六年荼公作舍齊人取歡及闡八年闡公作僤後同公會衛侯宋皇瑗于鄖十二年鄖公作運晉魏曼多帥師侵衛十三年曼下公無多字盜殺陳夏區夫十三年區公作彄春秋簡書刋誤卷二
